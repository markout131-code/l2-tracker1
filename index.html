<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2 ADEN - PRO TRACKER</title>
    <!-- Προσθήκη Gaming Γραμματοσειράς -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.95)), url('bg.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-card {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-top: 4px solid #ffd700; /* Χρυσή γραμμή στην κορυφή */
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 95%;
            max-width: 700px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            color: #ffd700; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            margin: 0; 
            font-size: 26px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        #clock { color: #aaa; font-size: 14px; margin-bottom: 25px; font-family: monospace; letter-spacing: 1px; }

        .status-badge {
            display: inline-block;
            padding: 5px 18px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .status-waiting { border: 1px solid #ffd700; color: #ffd700; background: rgba(255, 215, 0, 0.05); }
        .status-live { 
            border: 1px solid #00ff88; 
            color: #00ff88; 
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            animation: pulse-glow 2s infinite; 
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(0, 255, 136, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
            100% { box-shadow: 0 0 5px rgba(0, 255, 136, 0.2); }
        }

        .live-event-row {
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            margin-bottom: 15px;
        }

        .live-name { font-family: 'Orbitron', sans-serif; font-size: 28px; color: #fff; margin-bottom: 5px; display: block; }
        .live-timer { font-size: 55px; font-weight: bold; color: #00ff88; text-shadow: 0 0 25px rgba(0, 255, 136, 0.6); line-height: 1; }

        .next-name { font-family: 'Orbitron', sans-serif; font-size: 32px; color: #eee; text-transform: uppercase; }
        .next-timer { font-size: 65px; font-weight: bold; color: #ff9800; text-shadow: 0 0 30px rgba(255, 152, 0, 0.5); line-height: 1.2; }

        .schedule-title { 
            font-size: 12px; color: #666; margin: 30px 0 15px 0; 
            text-transform: uppercase; letter-spacing: 3px; 
            display: flex; align-items: center; justify-content: center;
        }
        .schedule-title::before, .schedule-title::after {
            content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.1); margin: 0 15px;
        }

        .events-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .event-item { 
            background: rgba(255, 255, 255, 0.02); 
            padding: 12px 18px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.3s;
        }
        .active-row { border-color: rgba(0, 255, 136, 0.5); background: rgba(0, 255, 136, 0.05); }
        .event-label { color: #bbb; font-size: 14px; font-weight: 500; }
        .event-time-info { color: #ffd700; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>L2 ADEN EVENTS</h1>
        <div id="clock">SERVER TIME: 00:00:00</div>
        
        <div id="status-box" class="status-badge status-waiting">LOADING...</div>
        
        <div id="active-events-container"></div>

        <div class="schedule-title">Full Schedule</div>
        <div id="grid-container" class="events-grid"></div>
    </div>

    <script>
        const eventsList = [
            { n: "Invasion", t: "12:00", d: 30 }, 
            { n: "Invasion", t: "16:00", d: 30 },
            { n: "Invasion", t: "20:00", d: 30 }, 
            { n: "Invasion", t: "00:00", d: 30 },
            { n: "Teddy Bears", t: "12:10", d: 15 }, 
            { n: "Teddy Bears", t: "23:45", d: 15 },
            { n: "Catacombs", t: "01:00", d: 60 }, 
            { n: "Olympiad", t: "02:00", d: 30 },
            { n: "Fortress", t: "04:00", d: 15 }, 
            { n: "Sieges", t: "01:00", d: 60 }
        ];

        function formatTime(ms) {
            let hh = Math.floor(ms / 3600000);
            let mm = Math.floor((ms % 3600000) / 60000);
            let ss = Math.floor((ms % 60000) / 1000);
            return String(hh).padStart(2,'0') + ":" + String(mm).padStart(2,'0') + ":" + String(ss).padStart(2,'0');
        }

        function update() {
            const now = new Date();
            document.getElementById('clock').innerHTML = "SERVER TIME: " + now.toLocaleTimeString('en-US');

            let processedEvents = eventsList.map(e => {
                const [h, m] = e.t.split(':').map(Number);
                let startTime = new Date();
                startTime.setUTCHours(h - 3, m, 0, 0); 
                let endTime = new Date(startTime.getTime() + e.d * 60000);

                if (now > endTime) {
                    startTime.setDate(startTime.getDate() + 1);
                    endTime.setDate(endTime.getDate() + 1);
                }

                let isLive = (now >= startTime && now <= endTime);
                let diff = isLive ? (endTime - now) : (startTime - now);

                return { ...e, startTime, endTime, isLive, diff };
            });

            processedEvents.sort((a, b) => {
                if (a.isLive && !b.isLive) return -1;
                if (!a.isLive && b.isLive) return 1;
                return a.diff - b.diff;
            });

            let liveEvents = processedEvents.filter(e => e.isLive);
            let nextEvent = processedEvents.find(e => !e.isLive);

            // GRID UPDATE
            let gridHtml = "";
            processedEvents.forEach((e) => {
                let timeDisplay = e.isLive ? "ENDS IN: " + formatTime(e.diff) : formatTime(e.diff);
                gridHtml += `<div class="event-item ${e.isLive ? 'active-row' : ''}"><span class="event-label">${e.n}</span><span class="event-time-info">${timeDisplay}</span></div>`;
            });
            document.getElementById('grid-container').innerHTML = gridHtml;

            // MAIN SCREEN UPDATE
            let container = document.getElementById('active-events-container');
            let statusBox = document.getElementById('status-box');

            if (liveEvents.length > 0) {
                statusBox.innerHTML = "EVENTS IN PROGRESS";
                statusBox.className = "status-badge status-live";
                
                let activeHtml = "";
                liveEvents.forEach(e => {
                    activeHtml += `
                        <div class="live-event-row">
                            <span class="live-name">${e.n}</span>
                            <span class="live-timer">${formatTime(e.diff)}</span>
                        </div>
                    `;
                });
                container.innerHTML = activeHtml;
            } else {
                statusBox.innerHTML = "NEXT EVENT";
                statusBox.className = "status-badge status-waiting";
                container.innerHTML = `
                    <div class="next-event-row">
                        <div class="next-name">${nextEvent.n}</div>
                        <div class="next-timer">${formatTime(nextEvent.diff)}</div>
                    </div>
                `;
            }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
