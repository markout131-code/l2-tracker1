<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2 ADEN - SECURE TRACKER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- ACCESS & LOADING LAYER --- */
        #access-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .access-content { text-align: center; font-family: 'Orbitron', sans-serif; }

        /* Spinner Styles */
        .spinner {
            position: relative; width: 100px; height: 100px; margin: 0 auto 30px;
        }
        .spinner::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 3px solid transparent; border-top: 3px solid #ffd700;
            border-radius: 50%; animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        .spinner::after {
            content: ""; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 2px solid transparent; border-bottom: 2px solid #ffae00;
            border-radius: 50%; animation: spin-reverse 1.5s linear infinite;
            opacity: 0.7;
        }

        /* Login Box */
        #login-box { display: none; margin-top: 20px; }
        #login-box h2 { color: #ffd700; font-size: 16px; letter-spacing: 3px; margin-bottom: 20px; }
        
        input[type="password"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ffd700;
            padding: 12px; color: #ffd700;
            text-align: center; font-family: 'Orbitron', sans-serif;
            outline: none; border-radius: 5px; width: 220px;
            transition: 0.3s;
        }
        input[type="password"]:focus { box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }

        button {
            background: #ffd700; border: none; padding: 12px 25px;
            font-family: 'Orbitron', sans-serif; font-weight: bold;
            cursor: pointer; border-radius: 5px; margin-top: 15px;
            transition: 0.3s; display: block; width: 100%;
        }
        button:hover { background: #fff; box-shadow: 0 0 20px #ffd700; }

        .error-msg { color: #ff4444; font-size: 11px; margin-top: 15px; display: none; letter-spacing: 1px; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* --- MAIN APP STYLES --- */
        body { 
            background-color: #050505; color: #ffffff; font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), url('bg.jpeg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .main-card {
            background: rgba(18, 18, 24, 0.92); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.2); border-top: 5px solid #ffd700;
            padding: 30px; border-radius: 25px; text-align: center;
            width: 95%; max-width: 700px; box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        }
        h1 { font-family: 'Orbitron', sans-serif; color: #ffd700; letter-spacing: 5px; font-size: 24px; margin: 0; }
        #clock { color: #aaa; font-size: 14px; margin-bottom: 20px; font-family: monospace; }
        .status-badge { display: inline-block; padding: 6px 20px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; }
        .status-waiting { border: 1px solid #ffd700; color: #ffd700; background: rgba(255, 215, 0, 0.05); }
        .status-live { border: 1px solid #00ff88; color: #00ff88; background: rgba(0, 255, 136, 0.15); animation: pulse-glow 2s infinite; }
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 10px 0 25px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 1s linear; }
        .bg-live { background: linear-gradient(90deg, #00ff88, #00bd65); }
        .bg-waiting { background: linear-gradient(90deg, #ff9800, #ffd700); }
        .live-timer { font-size: 55px; font-weight: bold; color: #00ff88; }
        .next-timer { font-size: 55px; font-weight: bold; color: #ff9800; }
        .events-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .event-item { background: rgba(255, 255, 255, 0.03); padding: 12px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .active-row { border-color: #00ff88; background: rgba(0, 255, 136, 0.05); }
        .event-time-info { color: #ffd700; font-weight: bold; font-family: monospace; }
        @media (max-width: 500px) { .events-grid { grid-template-columns: 1fr; } .live-timer, .next-timer { font-size: 40px; } }
    </style>
</head>
<body>

    <!-- SECURITY LAYER -->
    <div id="access-layer">
        <div class="access-content">
            <div id="loader-part">
                <div class="spinner"></div>
                <div style="color:#ffd700; letter-spacing:5px; font-size:12px;">ENCRYPTING CONNECTION...</div>
            </div>
            
            <div id="login-box">
                <h2>ACCESS RESTRICTED</h2>
                <input type="password" id="passInput" placeholder="ENTER ACCESS KEY">
                <button onclick="checkAccess()">UNLOCK SYSTEM</button>
                <div id="errorMsg" class="error-msg">ACCESS DENIED - WRONG KEY</div>
            </div>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div class="main-card">
        <h1>L2 ADEN EVENTS</h1>
        <div id="clock">LOCAL TIME: --:--:--</div>
        <div id="status-box" class="status-badge">INITIALIZING...</div>
        <div id="active-events-container"></div>
        <div style="font-size:11px; color:#666; margin:30px 0 15px; text-transform:uppercase; letter-spacing:3px;">Full Schedule</div>
        <div id="grid-container" class="events-grid"></div>
    </div>

    <script>
        // --- SECURITY LOGIC ---
        const SECRET_KEY = "adenl2";

        window.addEventListener("load", () => {
            setTimeout(() => {
                document.getElementById('loader-part').style.display = 'none';
                document.getElementById('login-box').style.display = 'block';
            }, 1500);
        });

        function checkAccess() {
            const val = document.getElementById('passInput').value;
            const layer = document.getElementById('access-layer');
            const error = document.getElementById('errorMsg');
            const box = document.getElementById('login-box');

            if(val === SECRET_KEY) {
                layer.style.opacity = '0';
                setTimeout(() => layer.style.display = 'none', 800);
            } else {
                error.style.display = 'block';
                box.classList.add('shake');
                setTimeout(() => box.classList.remove('shake'), 500);
                document.getElementById('passInput').value = "";
            }
        }

        // Allow "Enter" key
        document.getElementById("passInput").addEventListener("keyup", (e) => {
            if (e.key === "Enter") checkAccess();
        });

        // --- TRACKER LOGIC ---
        const icons = { "Invasion": "⚔️", "Teddy Bears": "🧸", "Catacombs": "💀", "Olympiad": "🏆", "Fortress": "🚩", "Sieges": "🏰", "Forest of Duels": "🤺", "Mafia's Hideout": "🕵️‍♂️", "Iron Depot": "🏗️", "Boss Subjugation": "👹" };
        const eventsList = [
            { n: "Invasion", t: "15:40", d: 30 }, { n: "Invasion", t: "19:40", d: 30 }, { n: "Invasion", t: "23:40", d: 30 }, { n: "Invasion", t: "03:40", d: 30 },
            { n: "Teddy Bears", t: "13:00", d: 15 }, { n: "Teddy Bears", t: "00:00", d: 15 }, { n: "Olympiad", t: "02:00", d: 30 }, { n: "Fortress", t: "22:00", d: 20 }, 
            { n: "Forest of Duels", t: "23:30", d: 30 }, { n: "Mafia's Hideout", t: "00:00", d: 25 }, { n: "Iron Depot", t: "22:05", d: 15 }, { n: "Boss Subjugation", t: "22:20", d: 25 }
        ];

        function formatTime(ms) {
            let hh = Math.floor(ms / 3600000);
            let mm = Math.floor((ms % 3600000) / 60000);
            let ss = Math.floor((ms % 60000) / 1000);
            return String(hh).padStart(2,'0') + ":" + String(mm).padStart(2,'0') + ":" + String(ss).padStart(2,'0');
        }

        function update() {
            const now = new Date();
            document.getElementById('clock').innerHTML = "LOCAL TIME: " + now.toLocaleTimeString('en-GB');

            let processedEvents = eventsList.map(e => {
                const [h, m] = e.t.split(':').map(Number);
                let startTime = new Date(now); startTime.setHours(h, m, 0, 0); 
                let endTime = new Date(startTime.getTime() + e.d * 60000);
                if (now > endTime) { startTime.setDate(startTime.getDate() + 1); endTime.setDate(endTime.getDate() + 1); }
                let isLive = (now >= startTime && now <= endTime);
                let diff = isLive ? (endTime - now) : (startTime - now);
                return { ...e, startTime, endTime, isLive, diff };
            });

            processedEvents.sort((a, b) => a.diff - b.diff);
            let liveEvents = processedEvents.filter(e => e.isLive);
            let nextEvent = processedEvents.find(e => !e.isLive);

            let gridHtml = "";
            processedEvents.forEach((e) => {
                gridHtml += `<div class="event-item ${e.isLive ? 'active-row' : ''}"><div>${icons[e.n] || ""} ${e.n}<br><small style="color:#666">Starts at ${e.t}</small></div><span class="event-time-info">${e.isLive ? 'LIVE' : formatTime(e.diff)}</span></div>`;
            });
            document.getElementById('grid-container').innerHTML = gridHtml;

            let container = document.getElementById('active-events-container');
            let statusBox = document.getElementById('status-box');
            let activeHtml = "";

            if (liveEvents.length > 0) {
                statusBox.innerHTML = "EVENTS LIVE"; statusBox.className = "status-badge status-live";
                liveEvents.forEach(e => {
                    let perc = (e.diff / (e.d * 60000)) * 100;
                    activeHtml += `<div style="margin-bottom:20px"><div style="font-family:'Orbitron'; font-size:28px">${e.n}</div><div class="live-timer">${formatTime(e.diff)}</div><div class="progress-container"><div class="progress-bar bg-live" style="width: ${perc}%"></div></div></div>`;
                });
            } else {
                statusBox.innerHTML = "NEXT EVENT"; statusBox.className = "status-badge status-waiting";
                let perc = 100 - Math.min(100, (nextEvent.diff / 3600000) * 100);
                activeHtml = `<div><div style="font-family:'Orbitron'; font-size:28px">${nextEvent.n}</div><div class="next-timer">${formatTime(nextEvent.diff)}</div><div class="progress-container"><div class="progress-bar bg-waiting" style="width: ${perc}%"></div></div></div>`;
            }
            container.innerHTML = activeHtml;
        }

        setInterval(update, 1000); update();
    </script>
</body>
</html>
