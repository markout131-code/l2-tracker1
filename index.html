<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2 ADEN - UNIVERSAL TRACKER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL STYLE --- */
        body { 
            background-color: #050505; 
            margin: 0;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), 
                        url('bg.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        /* --- ΚΟΙΝΟ ΣΤΥΛ ΓΙΑ LOGIN & APP --- */
        .glass-panel {
            background: rgba(18, 18, 24, 0.92);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-top: 5px solid #ffd700;
            padding: 40px; 
            border-radius: 25px; 
            text-align: center;
            width: 95%; 
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
            transition: 0.6s ease-in-out;
            background: inherit; /* Παίρνει το background του body */
        }

        .secure-text {
            color: #ffffff;
            font-size: 13px;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            display: block;
        }

        input[type="password"] {
            background: #000;
            border: 2px solid #ffd700;
            padding: 15px;
            color: #ffd700;
            text-align: center;
            width: 260px;
            border-radius: 8px;
            outline: none;
            font-size: 35px;
            letter-spacing: 12px;
            transition: 0.3s;
        }

        #status-msg {
            color: #ffd700;
            font-size: 11px;
            margin-top: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- MAIN APP --- */
        #app { display: none; }

        h1 { font-family: 'Orbitron', sans-serif; color: #ffd700; letter-spacing: 4px; margin-bottom: 5px; margin-top: 0; }
        #clock { color: #888; font-family: monospace; margin-bottom: 20px; font-size: 14px; }
        .live-timer { font-size: 60px; font-weight: bold; color: #00ff88; text-shadow: 0 0 20px rgba(0,255,136,0.4); }
        .next-timer { font-size: 60px; font-weight: bold; color: #ff9800; text-shadow: 0 0 20px rgba(255,152,0,0.3); }

        .events-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .event-item { 
            background: rgba(255, 255, 255, 0.03); padding: 12px; border-radius: 12px; 
            display: flex; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05);
        }
        .active-row { border-color: #00ff88; background: rgba(0, 255, 136, 0.05); }

        .shake { animation: shake 0.4s ease-in-out; border-color: #ff4444 !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        @media (max-width: 500px) { .events-grid { grid-template-columns: 1fr; } .live-timer, .next-timer { font-size: 45px; } }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-overlay">
        <div class="glass-panel">
            <h2 style="color:#ffd700; margin-bottom:5px; font-size:18px; letter-spacing:3px;">SYSTEM ACCESS</h2>
            <span class="secure-text">IDENTITY VERIFICATION REQUIRED</span>
            <input type="password" id="passInput" placeholder="••••••" autofocus autocomplete="off">
            <div id="status-msg">READY FOR INPUT</div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="glass-panel" id="app">
        <h1>ADEN TRACKER</h1>
        <div id="clock">LOCAL TIME: 00:00:00</div>
        <div id="active-display"></div>
        <div class="events-grid" id="grid"></div>
    </div>

    <script>
        const SECRET = "adenl2";
        const inputField = document.getElementById('passInput');
        const statusMsg = document.getElementById('status-msg');

        // LOGIN LOGIC
        inputField.addEventListener('input', function() {
            if(this.value === SECRET) {
                statusMsg.innerText = "ACCESS GRANTED";
                statusMsg.style.color = "#00ff88";
                this.style.borderColor = "#00ff88";
                
                setTimeout(() => {
                    document.getElementById('login-overlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('login-overlay').style.display = 'none';
                        document.getElementById('app').style.display = 'block';
                        startTracker();
                    }, 600);
                }, 200);
            } 
            else if (this.value.length >= 6) {
                statusMsg.innerText = "ACCESS DENIED - INVALID KEY";
                statusMsg.style.color = "#ff4444";
                this.classList.add('shake');
                setTimeout(() => {
                    this.classList.remove('shake');
                    this.value = "";
                    statusMsg.innerText = "READY FOR INPUT";
                    statusMsg.style.color = "#ffd700";
                }, 600);
            }
        });

        // TRACKER & TIMEZONE LOGIC
        const icons = { "Invasion": "⚔️", "Teddy Bears": "🧸", "Catacombs": "💀", "Olympiad": "🏆", "Fortress": "🚩", "Sieges": "🏰", "Forest of Duels": "🤺", "Mafia's Hideout": "🕵️‍♂️", "Iron Depot": "🏗️", "Boss Subjugation": "👹" };
        
        // Οι ώρες είναι σε ώρα Ελλάδος (GMT+3 ή GMT+2 ανάλογα την εποχή)
        // Ο κώδικας θα υπολογίσει τη διαφορά αυτόματα
        const eventsList = [
            { n: "Invasion", t: "15:40", d: 30 }, { n: "Invasion", t: "19:40", d: 30 }, { n: "Invasion", t: "23:40", d: 30 }, { n: "Invasion", t: "03:40", d: 30 },
            { n: "Teddy Bears", t: "13:00", d: 15 }, { n: "Teddy Bears", t: "00:00", d: 15 }, { n: "Olympiad", t: "02:00", d: 30 }, { n: "Fortress", t: "22:00", d: 20 }, 
            { n: "Forest of Duels", t: "23:30", d: 30 }, { n: "Mafia's Hideout", t: "00:00", d: 25 }, { n: "Iron Depot", t: "22:00", d: 15 }, { n: "Boss Subjugation", t: "22:20", d: 25 }
        ];

        function formatTime(ms) {
            let hh = Math.floor(ms / 3600000);
            let mm = Math.floor((ms % 3600000) / 60000);
            let ss = Math.floor((ms % 60000) / 1000);
            return String(hh).padStart(2,'0') + ":" + String(mm).padStart(2,'0') + ":" + String(ss).padStart(2,'0');
        }

        function getGreekTime() {
            // Δημιουργούμε μια ημερομηνία που δείχνει πάντα την τρέχουσα ώρα Ελλάδος
            return new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Athens"}));
        }

        function update() {
            const nowLocal = new Date();
            const nowGreek = getGreekTime();
            
            // Υπολογίζουμε τη διαφορά (offset) μεταξύ Ελλάδος και τοπικής ώρας χρήστη
            const timeDiff = nowGreek.getTime() - nowLocal.getTime();

            document.getElementById('clock').innerText = "YOUR LOCAL TIME: " + nowLocal.toLocaleTimeString('en-GB');

            let processed = eventsList.map(e => {
                const [h, m] = e.t.split(':').map(Number);
                
                // Φτιάχνουμε το event με βάση την ώρα Ελλάδος
                let startGreek = new Date(nowGreek);
                startGreek.setHours(h, m, 0, 0);
                
                let endGreek = new Date(startGreek.getTime() + e.d * 60000);

                // Αν το event πέρασε για σήμερα στην Ελλάδα, πάμε στην επόμενη μέρα
                if (nowGreek > endGreek) {
                    startGreek.setDate(startGreek.getDate() + 1);
                    endGreek.setDate(endGreek.getDate() + 1);
                }

                // Μετατρέπουμε την ώρα Ελλάδος σε τοπική ώρα χρήστη για το χρονόμετρο
                let startLocal = new Date(startGreek.getTime() - timeDiff);
                let endLocal = new Date(endGreek.getTime() - timeDiff);

                let isLive = (nowLocal >= startLocal && nowLocal <= endLocal);
                let diff = isLive ? (endLocal - nowLocal) : (startLocal - nowLocal);

                return { ...e, isLive, diff };
            });

            processed.sort((a, b) => a.diff - b.diff);

            let gridHtml = "";
            processed.forEach(e => {
                gridHtml += `<div class="event-item ${e.isLive ? 'active-row' : ''}">
                    <span style="font-size:13px">${icons[e.n] || ''} ${e.n}</span>
                    <span style="color:#ffd700; font-family:monospace; font-weight:bold">${e.isLive ? 'LIVE' : formatTime(e.diff)}</span>
                </div>`;
            });
            document.getElementById('grid').innerHTML = gridHtml;

            let live = processed.filter(e => e.isLive);
            let next = processed.find(e => !e.isLive);
            let display = document.getElementById('active-display');

            if (live.length > 0) {
                display.innerHTML = `<div style="color:#00ff88; font-size:12px; letter-spacing:2px; font-weight:bold">EVENT LIVE</div><div style="font-size:28px; font-family:Orbitron">${live[0].n}</div><div class="live-timer">${formatTime(live[0].diff)}</div>`;
            } else {
                display.innerHTML = `<div style="color:#ff9800; font-size:12px; letter-spacing:2px; font-weight:bold">UPCOMING</div><div style="font-size:28px; font-family:Orbitron">${next.n}</div><div class="next-timer">${formatTime(next.diff)}</div>`;
            }
        }

        function startTracker() {
            setInterval(update, 1000);
            update();
        }
    </script>
</body>
</html>
