<script>
        const icons = {
            "Invasion": "⚔️",
            "Teddy Bears": "🧸",
            "Catacombs": "💀",
            "Olympiad": "🏆",
            "Fortress": "🚩",
            "Sieges": "🏰", // Προστέθηκε κόμμα εδώ
            "Forest of Duels": "🤺",
            "Mafia's Hideout": "🕵️‍♂️",
            "Iron Depot": "🏗️",
            "Boss Subjugation": "👹"
        };

        const eventsList = [
            { n: "Invasion", t: "15:40", d: 30 }, 
            { n: "Invasion", t: "19:40", d: 30 },
            { n: "Invasion", t: "23:40", d: 30 }, 
            { n: "Invasion", t: "03:40", d: 30 },
            { n: "Teddy Bears", t: "13:00", d: 15 }, 
            { n: "Teddy Bears", t: "15:13", d: 15 },
            { n: "Catacombs", t: "01:00", d: 60 }, 
            { n: "Olympiad", t: "02:00", d: 30 },
            { n: "Fortress", t: "22:50", d: 15 }, 
            { n: "Sieges", t: "01:00", d: 60 }, // Προστέθηκε κόμμα εδώ
            { n: "Forest of Duels", t: "23:30", d: 30 }, // Προστέθηκε κόμμα εδώ
            { n: "Mafia's Hideout", t: "00:00", d: 30 }, // Προστέθηκε κόμμα εδώ
            { n: "Iron Depot", t: "22:00", d: 15 }, // Προστέθηκε κόμμα εδώ
            { n: "Boss Subjugation", t: "22:20", d: 25 }
        ];

        function formatTime(ms) {
            let hh = Math.floor(ms / 3600000);
            let mm = Math.floor((ms % 3600000) / 60000);
            let ss = Math.floor((ms % 60000) / 1000);
            return String(hh).padStart(2,'0') + ":" + String(mm).padStart(2,'0') + ":" + String(ss).padStart(2,'0');
        }

        function update() {
            const now = new Date();
            
            // Εμφάνιση Server Time σε UTC (για να ταυτίζεται με το παιχνίδι)
            const serverTimeStr = now.toLocaleTimeString('en-GB', { timeZone: 'UTC', hour12: false });
            document.getElementById('clock').innerHTML = "SERVER TIME (UTC): " + serverTimeStr;

            let processedEvents = eventsList.map(e => {
                const [h, m] = e.t.split(':').map(Number);
                let startTime = new Date();
                
                // Ρυθμίζουμε την ώρα απευθείας σε UTC
                startTime.setUTCHours(h, m, 0, 0); 
                let endTime = new Date(startTime.getTime() + e.d * 60000);

                // Αν το event έληξε, πάμε στην επόμενη μέρα
                if (now > endTime) {
                    startTime.setUTCDate(startTime.getUTCDate() + 1);
                    endTime.setUTCDate(endTime.getUTCDate() + 1);
                }

                let isLive = (now >= startTime && now <= endTime);
                let diff = isLive ? (endTime - now) : (startTime - now);
                
                return { ...e, startTime, endTime, isLive, diff };
            });

            // Ταξινόμηση ώστε το επόμενο χρονικά να είναι πρώτο
            processedEvents.sort((a, b) => a.diff - b.diff);

            let liveEvents = processedEvents.filter(e => e.isLive);
            let nextEvent = processedEvents.find(e => !e.isLive);

            // 1. GRID UPDATE
            let gridHtml = "";
            processedEvents.forEach((e) => {
                let icon = icons[e.n] || "";
                let timeDisplay = e.isLive ? "LIVE" : formatTime(e.diff);
                gridHtml += `
                    <div class="event-item ${e.isLive ? 'active-row' : ''}">
                        <span class="event-label">${icon} ${e.n}</span>
                        <span class="event-time-info">${timeDisplay}</span>
                    </div>`;
            });
            document.getElementById('grid-container').innerHTML = gridHtml;

            // 2. ACTIVE EVENTS UPDATE
            let container = document.getElementById('active-events-container');
            let statusBox = document.getElementById('status-box');
            let activeHtml = "";

            if (liveEvents.length > 0) {
                statusBox.innerHTML = "EVENTS IN PROGRESS";
                statusBox.className = "status-badge status-live";
                
                liveEvents.forEach(e => {
                    let totalDuration = e.d * 60000;
                    let percentage = (e.diff / totalDuration) * 100;
                    activeHtml += `
                        <div class="event-display-block">
                            <div class="live-name">${icons[e.n] || ''} ${e.n}</div>
                            <div class="live-timer">${formatTime(e.diff)}</div>
                            <div class="progress-container">
                                <div class="progress-bar bg-live" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                    `;
                });
            } else if (nextEvent) {
                statusBox.innerHTML = "NEXT EVENT";
                statusBox.className = "status-badge status-waiting";
                
                let percentage = 100 - Math.min(100, (nextEvent.diff / 3600000) * 100);
                activeHtml = `
                    <div class="event-display-block">
                        <div class="next-name">${icons[nextEvent.n] || ''} ${nextEvent.n}</div>
                        <div class="next-timer">${formatTime(nextEvent.diff)}</div>
                        <div class="progress-container">
                            <div class="progress-bar bg-waiting" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = activeHtml;
        }

        setInterval(update, 1000);
        update();
    </script>
