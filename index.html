<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2 ADEN - LIVE TRACKER PRO</title>
    <style>
        body { 
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)), url('bg.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-card {
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 750px;
            box-shadow: 0 20px 60px rgba(0,0,0,1);
        }

        h1 { color: #ffd700; text-transform: uppercase; letter-spacing: 5px; margin: 0; font-size: 24px; }
        #clock { color: #888; font-size: 14px; margin-bottom: 20px; font-family: monospace; }

        .status-badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        
        .status-waiting { background: rgba(255, 215, 0, 0.1); color: #ffd700; border: 1px solid #ffd700; }
        .status-live { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 2px solid #00ff88; animation: pulse-green 2s infinite; }

        @keyframes pulse-green {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        #active-events-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .live-event-row {
            padding: 15px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 15px;
            border-left: 5px solid #00ff88;
        }

        .live-name { font-size: 32px; font-weight: 900; text-transform: uppercase; display: block; }
        .live-timer { font-size: 50px; font-weight: bold; font-family: 'Courier New', monospace; color: #00ff88; text-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }

        .next-name { font-size: 35px; font-weight: 900; color: #fff; text-transform: uppercase; }
        .next-timer { font-size: 70px; font-weight: bold; font-family: 'Courier New', monospace; color: #ff9800; text-shadow: 0 0 30px rgba(255, 152, 0, 0.4); }

        .schedule-title { font-size: 13px; color: #888; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid rgba(255,215,0,0.1); padding-bottom: 10px; }
        .events-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .event-item { background: rgba(255, 255, 255, 0.03); padding: 10px 15px; border-radius: 12px; display: flex; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
        .active-row { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); }
        .event-label { color: #ddd; font-size: 12px; }
        .event-time-info { color: #ffd700; font-weight: bold; font-family: monospace; font-size: 13px; }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>L2 ADEN EVENTS</h1>
        <div id="clock">SERVER TIME: 00:00:00</div>
        
        <div id="status-box" class="status-badge status-waiting">LOADING...</div>
        
        <div id="active-events-container"></div>

        <div class="schedule-title">Full Schedule</div>
        <div id="grid-container" class="events-grid"></div>
    </div>

    <script>
        const eventsList = [
            { n: "Invasion", t: "12:00", d: 30 }, 
            { n: "Invasion", t: "16:00", d: 30 },
            { n: "Invasion", t: "20:00", d: 30 }, 
            { n: "Invasion", t: "00:00", d: 30 },
            { n: "Teddy Bears", t: "13:00", d: 15 }, 
            { n: "Teddy Bears", t: "23:45", d: 15 },
            { n: "Catacombs", t: "01:00", d: 60 }, 
            { n: "Olympiad", t: "02:00", d: 30 },
            { n: "Fortress", t: "04:00", d: 15 }, 
            { n: "Sieges", t: "01:00", d: 60 }
        ];

        function formatTime(ms) {
            let hh = Math.floor(ms / 3600000);
            let mm = Math.floor((ms % 3600000) / 60000);
            let ss = Math.floor((ms % 60000) / 1000);
            return String(hh).padStart(2,'0') + ":" + String(mm).padStart(2,'0') + ":" + String(ss).padStart(2,'0');
        }

        function update() {
            const now = new Date();
            // Αλλαγή σε 'en-US' για να φαίνεται AM/PM στο ρολόι
            document.getElementById('clock').innerHTML = "SERVER TIME: " + now.toLocaleTimeString('en-US');

            let processedEvents = eventsList.map(e => {
                const [h, m] = e.t.split(':').map(Number);
                let startTime = new Date();
                
                // Κλειδωμένο σε ώρα Ελλάδος (UTC+3)
                startTime.setUTCHours(h - 3, m, 0, 0); 

                let endTime = new Date(startTime.getTime() + e.d * 60000);

                if (now > endTime) {
                    startTime.setDate(startTime.getDate() + 1);
                    endTime.setDate(endTime.getDate() + 1);
                }

                let isLive = (now >= startTime && now <= endTime);
                let diff = isLive ? (endTime - now) : (startTime - now);

                return { ...e, startTime, endTime, isLive, diff };
            });

            processedEvents.sort((a, b) => {
                if (a.isLive && !b.isLive) return -1;
                if (!a.isLive && b.isLive) return 1;
                return a.diff - b.diff;
            });

            let liveEvents = processedEvents.filter(e => e.isLive);
            let nextEvent = processedEvents.find(e => !e.isLive);

            let gridHtml = "";
            processedEvents.forEach((e) => {
                let timeDisplay = e.isLive ? "ENDS IN: " + formatTime(e.diff) : formatTime(e.diff);
                gridHtml += `<div class="event-item ${e.isLive ? 'active-row' : ''}"><span class="event-label">${e.n}</span><span class="event-time-info">${timeDisplay}</span></div>`;
            });
            document.getElementById('grid-container').innerHTML = gridHtml;

            let container = document.getElementById('active-events-container');
            let statusBox = document.getElementById('status-box');

            if (liveEvents.length > 0) {
                statusBox.innerHTML = "EVENTS IN PROGRESS";
                statusBox.className = "status-badge status-live";
                
                let activeHtml = "";
                liveEvents.forEach(e => {
                    activeHtml += `
                        <div class="live-event-row">
                            <span class="live-name">${e.n}</span>
                            <span class="live-timer">${formatTime(e.diff)}</span>
                        </div>
                    `;
                });
                container.innerHTML = activeHtml;
            } else {
                statusBox.innerHTML = "NEXT EVENT";
                statusBox.className = "status-badge status-waiting";
                container.innerHTML = `
                    <div class="next-event-row">
                        <div class="next-name">${nextEvent.n}</div>
                        <div class="next-timer">${formatTime(nextEvent.diff)}</div>
                    </div>
                `;
            }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
