    <style>
        /* --- LOADING SCREEN STYLES (PREMIUM VERSION) --- */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-content { text-align: center; }

        /* Ο ΝΕΟΣ ΔΙΠΛΟΣ SPINNER */
        .spinner {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
        }

        /* Εξωτερικός δακτύλιος */
        .spinner::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 3px solid transparent;
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        /* Εσωτερικός δακτύλιος (γυρνάει ανάποδα) */
        .spinner::after {
            content: "";
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 2px solid transparent;
            border-bottom: 2px solid #ffae00;
            border-radius: 50%;
            animation: spin-reverse 1.5s linear infinite;
            opacity: 0.7;
        }

        .loader-text {
            font-family: 'Orbitron', sans-serif;
            color: #ffd700;
            letter-spacing: 5px;
            font-size: 14px;
            animation: blink 1.5s infinite;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .loader-hidden { opacity: 0; visibility: hidden; }

        body { 
            background-color: #050505;

            font-family: 'Rajdhani', sans-serif;

            min-height: 100vh; margin: 0;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .main-card {
            background: rgba(18, 18, 24, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-top: 5px solid #ffd700;
            padding: 30px; border-radius: 25px; text-align: center;
            width: 95%; max-width: 700px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        }

        #clock { color: #888; font-size: 14px; margin-bottom: 20px; letter-spacing: 2px; font-family: monospace; }

        .status-badge {
            display: inline-block; padding: 6px 20px; border-radius: 4px; font-size: 12px;
            font-weight: bold; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px;
        }

        }

            border-radius: 10px; margin: 10px 0 25px 0; overflow: hidden;
        }
