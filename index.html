        body {

            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-top: 20px;

        .event-item {

            cursor: pointer;
        }

        .event-item:hover {
            background: rgba(255, 215, 0, 0.1); 
            border-color: rgba(255, 215, 0, 0.5); 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4); 
        }

        .event-item.active-row:hover {
            background: rgba(0, 255, 136, 0.15);

        }

        @media (max-width: 600px) {
            .glass-panel { padding: 15px; margin: 10px auto; width: 98%; }

        .event-countdown { color: #ffd700; font-family: monospace; font-size: 18px; font-weight: bold; }
        .event-label { font-size: 10px; color: #777; text-transform: uppercase; }
        .active-row { border-color: #00ff88 !important; background: rgba(0, 255, 136, 0.08) !important; }
    </style>
</head>
