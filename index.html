<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L2 ADEN - SECURE TRACKER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
            transition: 0.5s;
        }

        .login-box {
            text-align: center;
            background: rgba(20, 20, 25, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            font-family: 'Orbitron', sans-serif;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(255, 215, 0, 0.1);
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        input[type="password"] {
            background: #111;
            border: 1px solid #444;
            padding: 12px;
            color: #ffd700;
            text-align: center;
            width: 200px;
            border-radius: 5px;
            margin-bottom: 15px;
            outline: none;
            font-family: sans-serif;
        }

        button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { background: #fff; box-shadow: 0 0 15px #ffd700; }

        /* --- MAIN APP --- */
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0;
            /* BACKGROUND IMAGE ΜΕ FALLBACK ΧΡΩΜΑ */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), 
                        url('bg.jpeg') no-repeat center center fixed;
            background-size: cover;
        }

        .main-card {
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-top: 5px solid #ffd700;
            padding: 30px; border-radius: 25px; text-align: center;
            width: 95%; max-width: 650px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: none; /* Κρυφό μέχρι το login */
        }

        h1 { font-family: 'Orbitron', sans-serif; color: #ffd700; letter-spacing: 3px; font-size: 22px; margin: 0; }
        #clock { color: #888; font-size: 14px; margin-bottom: 20px; font-family: monospace; }

        .status-badge {
            display: inline-block; padding: 5px 15px; border-radius: 4px; font-size: 11px;
            font-weight: bold; text-transform: uppercase; margin-bottom: 15px;
        }
        .status-waiting { border: 1px solid #ffd700; color: #ffd700; background: rgba(255, 215, 0, 0.05); }
        .status-live { border: 1px solid #00ff88; color: #00ff88; background: rgba(0, 255, 136, 0.1); animation: blink 2s infinite; }

        .live-timer { font-size: 50px; font-weight: bold; color: #00ff88; text-shadow: 0 0 15px rgba(0,255,136,0.3); }
        .next-timer { font-size: 50px; font-weight: bold; color: #ff9800; text-shadow: 0 0 15px rgba(255,152,0,0.3); }

        .events-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .event-item { 
            background: rgba(255, 255, 255, 0.03); padding: 10px; border-radius: 10px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .active-row { border-color: #00ff88; background: rgba(0, 255, 136, 0.05); }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @media (max-width: 500px) { .events-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <!-- LOGIN SECTION -->
    <div id="login-overlay">
        <div class="login-box">
            <div class="spinner"></div>
            <h3 style="color:#ffd700; margin-bottom:20px; font-size:14px;">SYSTEM RESTRICTED</h3>
            <input type="password" id="passInput" placeholder="PASSWORD">
            <br>
            <button onclick="unlock()">Enter Aden</button>
            <p id="error" style="color:red; font-size:12px; margin-top:10px; display:none;">WRONG PASSWORD</p>
        </div>
    </div>

    <!-- MAIN APP SECTION -->
    <div class="main-card" id="app">
        <h1>L2 ADEN EVENTS</h1>
        <div id="clock">LOCAL TIME: --:--:--</div>
        <div id="status-box" class="status-badge">READY</div>
        <div id="active-display"></div>
        <div class="events-grid" id="grid"></div>
    </div>

    <script>
        // 1. LOGIN LOGIC
        function unlock() {
            const pass = document.getElementById('passInput').value;
            if(pass === "adenl2") {
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    startTracker(); // Ξεκινάει το tracker μόνο μετά το login
                }, 500);
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('passInput').value = "";
            }
        }

        // 2. TRACKER LOGIC
        const icons = { "Invasion": "⚔️", "Teddy Bears": "🧸", "Catacombs": "💀", "Olympiad": "🏆", "Fortress": "🚩", "Sieges": "🏰", "Forest of Duels": "🤺", "Mafia's Hideout": "🕵️‍♂️", "Iron Depot": "🏗️", "Boss Subjugation": "👹" };
        const eventsList = [
            { n: "Invasion", t: "15:40", d: 30 }, { n: "Invasion", t: "19:40", d: 30 }, { n: "Invasion", t: "23:40", d: 30 }, { n: "Invasion", t: "03:40", d: 30 },
            { n: "Teddy Bears", t: "13:00", d: 15 }, { n: "Teddy Bears", t: "00:00", d: 15 }, { n: "Olympiad", t: "02:00", d: 30 }, { n: "Fortress", t: "22:00", d: 20 }, 
            { n: "Forest of Duels", t: "23:30", d: 30 }, { n: "Mafia's Hideout", t: "00:00", d: 25 }, { n: "Iron Depot", t: "22:05", d: 15 }, { n: "Boss Subjugation", t: "22:20", d: 25 }
        ];

        function formatTime(ms) {
            let hh = Math.floor(ms / 3600000);
            let mm = Math.floor((ms % 3600000) / 60000);
            let ss = Math.floor((ms % 60000) / 1000);
            return String(hh).padStart(2,'0') + ":" + String(mm).padStart(2,'0') + ":" + String(ss).padStart(2,'0');
        }

        function update() {
            const now = new Date();
            document.getElementById('clock').innerText = "LOCAL TIME: " + now.toLocaleTimeString('en-GB');

            let processed = eventsList.map(e => {
                const [h, m] = e.t.split(':').map(Number);
                let start = new Date(now); start.setHours(h, m, 0, 0);
                let end = new Date(start.getTime() + e.d * 60000);
                if (now > end) { start.setDate(start.getDate() + 1); end.setDate(end.getDate() + 1); }
                let isLive = (now >= start && now <= end);
                let diff = isLive ? (end - now) : (start - now);
                return { ...e, isLive, diff };
            });

            processed.sort((a, b) => a.diff - b.diff);

            // Render Grid
            let gridHtml = "";
            processed.forEach(e => {
                gridHtml += `<div class="event-item ${e.isLive ? 'active-row' : ''}">
                    <span style="font-size:13px">${icons[e.n] || ''} ${e.n}</span>
                    <span style="color:#ffd700; font-family:monospace">${e.isLive ? 'LIVE' : formatTime(e.diff)}</span>
                </div>`;
            });
            document.getElementById('grid').innerHTML = gridHtml;

            // Render Active
            let live = processed.filter(e => e.isLive);
            let next = processed.find(e => !e.isLive);
            let status = document.getElementById('status-box');
            let display = document.getElementById('active-display');

            if (live.length > 0) {
                status.innerText = "EVENTS IN PROGRESS"; status.className = "status-badge status-live";
                display.innerHTML = `<div style="font-size:24px; font-family:Orbitron">${live[0].n}</div><div class="live-timer">${formatTime(live[0].diff)}</div>`;
            } else {
                status.innerText = "NEXT EVENT"; status.className = "status-badge status-waiting";
                display.innerHTML = `<div style="font-size:24px; font-family:Orbitron">${next.n}</div><div class="next-timer">${formatTime(next.diff)}</div>`;
            }
        }

        function startTracker() {
            setInterval(update, 1000);
            update();
        }

        // Επιτρέπει το Enter στο password field
        document.getElementById("passInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") unlock();
        });
    </script>
</body>
</html>
